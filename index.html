<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Чат бо дизайни махсуси галчкаҳо ва ҳисобкунак</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f5f7fb; display: flex; justify-content: center; align-items: center; height: 100vh; height: 100dvh; overflow: hidden; }
        .phone-container { width: 100%; max-width: 480px; height: 100vh; height: 100dvh; background: #ffffff; display: flex; flex-direction: column; position: relative; box-shadow: 0 8px 30px rgba(0,0,0,0.08); overflow: hidden; }
        .screen { display: none; flex-direction: column; flex: 1; padding: 20px; overflow-y: auto; background: #f8fafc; -webkit-overflow-scrolling: touch; }
        .active-screen { display: flex; animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
         
        #auth-screen { display: flex; justify-content: center; align-items: center; height: 100vh; height: 100dvh; z-index: 100; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); position: absolute; width: 100%; padding: 20px; }
        .auth-form { width: 100%; max-width: 350px; background: white; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.15); }

        #chat-window { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; z-index: 50; display: none; flex-direction: column; overflow: hidden; }
        .chat-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px; display: flex; align-items: center; gap: 15px; flex-shrink: 0; }
        .back-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
         
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
         
        .date-divider { text-align: center; margin: 10px 0; display: flex; align-items: center; justify-content: center; width: 100%; }
        .date-divider span { background: rgba(0, 0, 0, 0.06); color: #666; padding: 4px 14px; border-radius: 12px; font-size: 11px; font-weight: 500; }

        .msg-wrapper { display: flex; gap: 8px; width: 100%; max-width: 80%; margin-bottom: 2px; }
        .msg-wrapper.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg-wrapper.other { align-self: flex-start; flex-direction: row; }
         
        .msg-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: #e2e8f0; flex-shrink: 0; }
         
        .msg-body { display: flex; flex-direction: column; max-width: calc(100% - 40px); position: relative; }
        .msg-wrapper.me .msg-body { align-items: flex-end; }
        .msg-wrapper.other .msg-body { align-items: flex-start; }
         
        .msg-username { font-size: 11px; color: #718096; font-weight: 600; margin-bottom: 2px; padding: 0 4px; }
         
        .msg-bubble { position: relative; border-radius: 16px; padding: 10px 14px; padding-bottom: 24px; min-width: 90px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
        .msg-wrapper.me .msg-bubble { background: #667eea; color: white; border-bottom-right-radius: 4px; padding-top: 10px; } 
        .msg-wrapper.other .msg-bubble { background: white; color: #333; border-bottom-left-radius: 4px; }
         
        .msg-text { font-size: 15px; word-break: break-word; overflow-wrap: break-word; line-height: 20px; }

        .msg-footer { position: absolute; bottom: 4px; right: 10px; display: flex; align-items: center; gap: 4px; font-size: 11px; }
        .msg-wrapper.me .msg-footer { color: rgba(255, 255, 255, 0.75); }
        .msg-wrapper.other .msg-footer { color: #a0aec0; }

        .ticks { font-size: 11px; margin-left: 2px; display: inline-block; font-weight: bold; }
        .ticks.delivered { color: rgba(255, 255, 255, 0.6); }
        .ticks.read { color: #40c4ff; }

        .delete-btn { background: none; border: none; color: #ff3b30; cursor: pointer; font-size: 11px; opacity: 0.7; margin-right: 5px; }
        .delete-btn:hover { opacity: 1; }

        .badge { background: #ff3b30; color: white; border-radius: 10px; padding: 2px 7px; font-size: 11px; font-weight: bold; display: inline-block; min-width: 18px; text-align: center; }
        .nav-item { position: relative; }
        .nav-badge { position: absolute; top: 4px; right: 22%; background: #ff3b30; color: white; border-radius: 10px; padding: 1px 6px; font-size: 10px; font-weight: bold; min-width: 16px; text-align: center; display: none; }

        .chat-input-area { padding: 10px; background: white; display: flex; gap: 10px; border-top: 1px solid #edf2f7; align-items: flex-end; flex-shrink: 0; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        #message-input { flex: 1; width: 0; height: 40px; max-height: 100px; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 18px; font-size: 15px; background: #f8fafc; outline: none; resize: none; overflow-y: auto; line-height: 20px; }

        input[type="text"], input[type="tel"], input[type="password"] { width: 100%; padding: 12px 16px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 16px; background: #f8fafc; outline: none; -webkit-appearance: none; }
        input:focus, #message-input:focus { border-color: #667eea; background: #fff; }
         
        .password-container { position: relative; width: 100%; }
        .password-container input { padding-right: 45px; }
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 18px; color: #718096; outline: none; }

        .btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
        .btn-secondary { background: #e2e8f0; color: #4a5568; margin-top: 8px; }
        .btn-danger { background: linear-gradient(135deg, #f56565 0%, #c53030 100%); color: white; margin-top: 8px; }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; width: auto; display: inline-block; margin-top: 10px; }

        .create-room-box, .edit-profile-box { display: none; background: white; padding: 15px; border-radius: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); margin-top: 10px; animation: slideDown 0.2s ease-in-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .item-card { background: white; padding: 14px; margin-bottom: 12px; border-radius: 14px; border-left: 5px solid #667eea; box-shadow: 0 2px 8px rgba(0,0,0,0.04); display: flex; flex-direction: column; gap: 10px; cursor: pointer; position: relative; }
        .card-main-info { display: flex; align-items: center; width: 100%; justify-content: space-between; }
        .card-info { display: flex; flex-direction: column; gap: 3px; max-width: 70%; }
        .room-avatar, .user-avatar { width: 45px; height: 45px; border-radius: 50%; background: #e2e8f0; object-fit: cover; }
        .profile-avatar-big { width: 65px; height: 65px; border-radius: 50%; background: #e2e8f0; object-fit: cover; }
        .lock-icon { font-size: 18px; margin-left: auto; }

        .room-actions { display: flex; gap: 6px; width: 100%; margin-top: 5px; flex-wrap: wrap; }
        .action-btn { flex: 1; min-width: 75px; padding: 8px 4px; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; }
        .btn-enter { background: #e0e7ff; color: #4f46e5; }
        .btn-share { background: #d1fae5; color: #065f46; }
        .btn-delete { background: #fee2e2; color: #dc2626; }

        .searched-user-box { background: #e0e7ff; border: 2px dashed #4f46e5; padding: 12px; border-radius: 14px; margin-bottom: 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; animation: fadeIn 0.3s ease; }

        .bottom-nav { height: calc(65px + env(safe-area-inset-bottom)); border-top: 1px solid #edf2f7; display: flex; justify-content: space-around; align-items: center; background: #ffffff; flex-shrink: 0; width: 100%; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { border: none; background: none; font-size: 12px; color: #a0aec0; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; cursor: pointer; height: 100%; justify-content: center; }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; }
        .nav-item.active { color: #667eea; font-weight: 600; }
         
        .user-profile-box { background: linear-gradient(135deg, #f6f8fb, #eef2f7); padding: 15px; border-radius: 14px; margin-bottom: 15px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 15px; }
        hr { border: 0; height: 1px; background: #e2e8f0; margin: 20px 0; }
    </style>
</head>
<body>

<div class="phone-container">

    <div id="auth-screen">
        <div class="auth-form">
            <h2 style="margin-bottom: 10px;">Воридшавӣ / Сабти ном</h2>
            <input type="text" id="username" placeholder="Номи шумо...">
            <input type="tel" id="userphone" placeholder="Рақами телефон (масалан: 9999)">
            <div class="password-container">
                <input type="password" id="userpass" placeholder="Рамзи махфии шумо...">
                <button type="button" class="toggle-password" onclick="togglePasswordVisibility('userpass', this)">👁️</button>
            </div>
            <button class="btn" onclick="login()">Ворид шудан</button>
        </div>
    </div>

    <div id="chat-window">
        <div class="chat-header">
            <button class="back-btn" onclick="closeChat()">←</button>
            <h4 id="chat-title">Номи чат</h4>
        </div>
        <div class="chat-messages" id="chat-messages-list"></div>
        <div class="chat-input-area">
            <textarea id="message-input" placeholder="Паёмак..." oninput="autoGrow(this)"></textarea>
            <button class="btn" onclick="sendMessage()" style="width: auto; padding: 10px 20px; flex-shrink: 0; height: 40px; border-radius: 18px;">Фиристодан</button>
        </div>
    </div>

    <div id="home-screen" class="screen">
        <input type="text" id="search-input" onkeyup="searchFunction()" placeholder="🔍 Ҷустуҷӯ бо номи комната ё рақам...">
        <div id="search-user-result"></div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin: 10px 0;">
            <h3 id="rooms-list-title">🏢 Ҳамаи Комнатаҳо</h3>
            <button id="reset-filter-btn" class="btn btn-secondary btn-sm" onclick="resetRoomFilter()" style="display: none; margin: 0;">Ҳамаашро нишон деҳ</button>
        </div>
        <div id="all-rooms-list"></div>
    </div>

    <div id="chat-screen" class="screen">
        <h3 style="margin-bottom: 10px;">💬 Чатҳои фаъол</h3>
        <div id="active-chats-list"></div>
    </div>

    <div id="profile-screen" class="screen">
        <h3 style="margin-bottom: 10px;">👤 Профили ман</h3>
        <div class="user-profile-box" id="my-profile-info"></div>

        <div class="edit-profile-box" id="edit-profile-box">
            <h4 style="margin-bottom: 5px; color: #4a5568;">Таҳрири маълумот</h4>
            <input type="text" id="edit-name" placeholder="Номи нав">
            <input type="tel" id="edit-phone" placeholder="Рақами нав" readonly style="background:#e2e8f0; color:gray;">
             
            <div class="password-container">
                <input type="password" id="edit-pass" placeholder="Рамзи (парол)-и нав">
                <button type="button" class="toggle-password" onclick="togglePasswordVisibility('edit-pass', this)">👁️</button>
            </div>

            <label style="font-size: 13px; color: gray; display:block; margin-top:5px;">Расми профил:</label>
            <input type="file" id="edit-avatar-file" accept="image/*" style="margin-bottom: 10px; width: 100%;">
            <button class="btn" onclick="saveProfileChanges()">Ҳифз кардан</button>
            <button class="btn btn-secondary" onclick="toggleProfileForm(false)">Баргаштан</button>
        </div>

        <div style="margin-top: 10px; display: flex; gap: 10px;">
            <button class="btn" id="open-form-btn" onclick="toggleRoomForm(true)" style="flex: 1;">➕ Сохтани комната</button>
        </div>

        <div class="create-room-box" id="room-form-box">
            <h4 style="margin-bottom: 5px; color: #4a5568;">Маълумоти комната</h4>
            <input type="text" id="room-name" placeholder="Номи комната">
            <input type="password" id="room-pass" placeholder="Рамз (парол) - ихтиёри">
            <label style="font-size: 13px; color: gray; display:block; margin-top:5px;">Расми комната (Ихтиёри):</label>
            <input type="file" id="room-icon" accept="image/*" style="margin-bottom: 10px; width: 100%;">
            <button class="btn" onclick="createRoom()">Сохтан</button>
            <button class="btn btn-secondary" onclick="toggleRoomForm(false)">Баргаштан</button>
        </div>
         
        <hr>
        <h3 style="margin-bottom: 10px;">📦 Комнатаҳои сохтаи ман</h3>
        <div id="my-rooms-list"></div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchScreen('home-screen', this)">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Главни
        </button>
        <button class="nav-item" onclick="switchScreen('chat-screen', this)">
            <div class="nav-badge" id="total-unread-badge">0</div>
            <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>Чат
        </button>
        <button class="nav-item" onclick="switchScreen('profile-screen', this)">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-3-8-3z"/></svg>Я
        </button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSy...",
        authDomain: "my-live-chat-ca902.firebaseapp.com",
        databaseURL: "https://my-live-chat-ca902-default-rtdb.firebaseio.com",
        projectId: "my-live-chat-ca902",
        storageBucket: "my-live-chat-ca902.firebasestorage.app",
        messagingSenderId: "396836014742",
        appId: "1:396836014742:web:..."
    };
     
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let currentChatRoomId = "";
    let roomsData = []; 
    let globalUnreadCounts = {}; 
    let lastMessagesData = {};
    const defaultAvatar = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
     
    let userData = { name: "", phone: "", password: "", img: defaultAvatar };

    window.onload = function() {
        const messageInput = document.getElementById('message-input');
        if (messageInput) {
            messageInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        }

        let savedUser = localStorage.getItem('chat_user_data');
        if(savedUser) {
            userData = JSON.parse(savedUser);
            enterApp();
        }
    }

    function autoGrow(element) {
        element.style.height = "40px"; 
        element.style.height = (element.scrollHeight) + "px";
    }

    function togglePasswordVisibility(inputId, btn) {
        let input = document.getElementById(inputId);
        if (input.type === "password") {
            input.type = "text";
            btn.innerText = "🙈";
        } else {
            input.type = "password";
            btn.innerText = "👁️";
        }
    }

    function compressImage(file, callback) {
        let reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function (event) {
            let img = new Image();
            img.src = event.target.result;
            img.onload = function () {
                let canvas = document.createElement('canvas');
                let MAX_WIDTH = 120;
                let MAX_HEIGHT = 120;
                let width = img.width;
                let height = img.height;

                if (width > height) {
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                } else {
                    if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                }
                canvas.width = width;
                canvas.height = height;
                let ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0, width, height);
                callback(canvas.toDataURL("image/jpeg", 0.7));
            }
        }
    }

    function login() {
        let name = document.getElementById('username').value.trim();
        let phone = document.getElementById('userphone').value.trim();
        let pass = document.getElementById('userpass').value.trim();
         
        if(!name || !phone || !pass) { alert("Лутфан ном, рақам ва рамзи махфиро нависед!"); return; }
        if(pass.length < 4) { alert("Рамз бояд ҳадди ақал аз 4 аломат иборат бошад!"); return; }

        database.ref('users/' + phone).once('value', (snapshot) => {
            let serverUser = snapshot.val();
            if(serverUser) {
                if(serverUser.password === pass) {
                    userData = serverUser;
                    localStorage.setItem('chat_user_data', JSON.stringify(userData));
                    enterApp();
                } else {
                    alert("Ин рақами телефон аллакай сабт шудааст ва рамзи воридкардаи шумо нодуруст аст!");
                }
            } else {
                userData = { name: name, phone: phone, password: pass, img: defaultAvatar };
                database.ref('users/' + phone).set(userData).then(() => {
                    localStorage.setItem('chat_user_data', JSON.stringify(userData));
                    enterApp();
                });
            }
        });
    }

    function enterApp() {
        updateProfileUI();
        const authScreen = document.getElementById('auth-screen');
        if (authScreen) authScreen.style.display = 'none';
        
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        const homeScreen = document.getElementById('home-screen');
        if (homeScreen) homeScreen.classList.add('active-screen');
        
        loadRoomsFromServer();
        listenToUnreadMessages(); 
    }

    function logout() {
        if(confirm("Оё мехоҳед аз барнома бароед?")) {
            localStorage.removeItem('chat_user_data');
            document.getElementById('username').value = "";
            document.getElementById('userphone').value = "";
            document.getElementById('userpass').value = "";
            const authScreen = document.getElementById('auth-screen');
            if (authScreen) authScreen.style.display = 'flex';
        }
    }

    function updateProfileUI() {
        const profileInfo = document.getElementById('my-profile-info');
        if (!profileInfo) return;
        profileInfo.innerHTML = `
            <img src="${userData.img || defaultAvatar}" class="profile-avatar-big">
            <div style="flex: 1; font-size: 15px; color: #2d3748;">
                <b>Ном:</b> <span>${userData.name}</span><br>
                <span style="margin-top: 3px; display:inline-block;"><b>Рақам:</b> <span>${userData.phone}</span></span><br>
                <button class="btn btn-secondary btn-sm" onclick="toggleProfileForm(true)">✏️ Таҳрир</button>
                <button class="btn btn-danger btn-sm" onclick="logout()" style="margin-left: 5px;">🚪 Баромадан</button>
            </div>`;
    }

    function saveProfileChanges() {
        let newName = document.getElementById('edit-name').value.trim();
        let newPass = document.getElementById('edit-pass').value.trim();
        let fileInput = document.getElementById('edit-avatar-file');

        if(!newName || !newPass) { alert("Лутфан ном ва рамзро холӣ нагузоред!"); return; }
        if(newPass.length < 4) { alert("Рамзи нав бояд ҳадди ақал аз 4 аломат иборат бошад!"); return; }

        userData.name = newName;
        userData.password = newPass;

        let saveFinal = () => {
            localStorage.setItem('chat_user_data', JSON.stringify(userData));
            database.ref('users/' + userData.phone).set(userData).then(() => {
                updateProfileUI();
                toggleProfileForm(false);
                alert("Маълумоти профил ва рамзи шумо бомуваффақият нав шуданд!");
            });
        }

        if(fileInput.files && fileInput.files[0]) {
            compressImage(fileInput.files[0], function(compressedUrl) {
                userData.img = compressedUrl;
                saveFinal();
            });
        } else { saveFinal(); }
    }

    function switchScreen(screenId, element) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        const targetScreen = document.getElementById(screenId);
        if (targetScreen) targetScreen.classList.add('active-screen');
        
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if (element) element.classList.add('active');
        
        if(screenId === 'chat-screen') { renderActiveChats(); }
    }

    function toggleProfileForm(show) {
        let box = document.getElementById('edit-profile-box');
        if(!box) return;
        if(show) {
            document.getElementById('edit-name').value = userData.name;
            document.getElementById('edit-phone').value = userData.phone;
            document.getElementById('edit-pass').value = userData.password || "";
            document.getElementById('edit-pass').type = "password";
            box.querySelector('.toggle-password').innerText = "👁️";
            box.style.display = 'block';
        } else { box.style.display = 'none'; }
    }

    function toggleRoomForm(show) {
        let formBox = document.getElementById('room-form-box');
        let openBtn = document.getElementById('open-form-btn');
        if (formBox) formBox.style.display = show ? 'block' : 'none';
        if (openBtn) openBtn.style.display = show ? 'none' : 'block';
    }

    function createRoom() {
        let rName = document.getElementById('room-name').value.trim();
        let rPass = document.getElementById('room-pass').value.trim();
        let fileInput = document.getElementById('room-icon');

        if(!rName) { alert("Лутфан номи комнатаро нависед!"); return; }

        let roomId = 'room_' + Date.now();
        let newRoomData = {
            id: roomId,
            name: rName,
            pass: rPass || null,
            creatorPhone: userData.phone,
            creatorName: userData.name,
            img: defaultAvatar,
            link: window.location.href.split('?')[0] + "?room=" + roomId
        };

        let saveRoom = () => {
            database.ref('rooms/' + roomId).set(newRoomData).then(() => {
                alert("Комната бомуваффақият сохта шуд!");
                document.getElementById('room-name').value = "";
                document.getElementById('room-pass').value = "";
                fileInput.value = "";
                toggleRoomForm(false);
            });
        }

        if(fileInput.files && fileInput.files[0]) {
            compressImage(fileInput.files[0], function(compressedUrl) {
                newRoomData.img = compressedUrl;
                saveRoom();
            });
        } else { saveRoom(); }
    }

    function deleteRoom(roomId) {
        if(confirm("Оё мехоҳед ин комнатаро нест кунед? Тамоми паёмҳо низ нест мешаванд.")) {
            database.ref('rooms/' + roomId).remove();
            database.ref('messages/' + roomId).remove();
        }
    }

    function shareRoom(link) {
        if(!link) { alert("Линк мавҷуд нест!"); return; }
        navigator.clipboard.writeText(link).then(() => {
            alert("Истинод (ссылка)-и комната нусхабардорӣ шуд!");
        }).catch(() => {
            alert("Истинод: " + link);
        });
    }

    function loadRoomsFromServer() {
        database.ref('rooms').on('value', (snapshot) => {
            let rooms = snapshot.val();
            roomsData = []; 
            if(rooms) {
                Object.keys(rooms).forEach(id => { roomsData.push(rooms[id]); });
            }
            renderRoomsUI();
            if(document.getElementById('chat-screen').classList.contains('active-screen')) {
                renderActiveChats();
            }
        });
    }

    function renderRoomsUI() {
        let myRoomsHTML = ""; 
        let allRoomsHTML = "";

        roomsData.forEach(room => {
            if(filterByCreatorPhone && room.creatorPhone !== filterByCreatorPhone) return;
            let lockIcon = room.pass ? "🔒" : "🔓";

            allRoomsHTML += `
                <div class="item-card" onclick="tryEnterRoom('${room.id}')">
                    <div class="card-main-info">
                        <img src="${room.img || defaultAvatar}" class="room-avatar">
                        <div class="card-info" style="flex:1; margin-left:10px;">
                            <b>🏢 ${room.name}</b>
                            <span style="font-size:11px; color:gray; display:block;">Аз: ${room.creatorName}</span>
                        </div>
                        <span class="lock-icon">${lockIcon}</span>
                    </div>
                </div>`;

            if(room.creatorPhone === userData.phone) {
                myRoomsHTML += `
                    <div class="item-card" id="my-room-${room.id}">
                        <div class="card-main-info">
                            <img src="${room.img || defaultAvatar}" class="room-avatar">
                            <div class="card-info" style="flex:1; margin-left:10px;"><b>🏢 ${room.name}</b></div>
                            <span class="lock-icon">${lockIcon}</span>
                        </div>
                        <div class="room-actions">
                            <button class="action-btn btn-enter" onclick="tryEnterRoom('${room.id}')">Ворид</button>
                            <button class="action-btn btn-share" onclick="shareRoom('${room.link || ''}')">Поделиться</button>
                            <button class="action-btn btn-delete" onclick="deleteRoom('${room.id}')">Нест кардан</button>
                        </div>
                    </div>`;
            }
        });

        const myRoomsList = document.getElementById('my-rooms-list');
        const allRoomsList = document.getElementById('all-rooms-list');
        
        if (myRoomsList) myRoomsList.innerHTML = myRoomsHTML || "<p style='color:gray; font-size:14px;'>Комнатаҳои сохтаи шумо нест.</p>";
        if (allRoomsList) allRoomsList.innerHTML = allRoomsHTML || "<p style='color:gray; font-size:14px;'>Ҳеҷ комнатае мавҷуд нест.</p>";
    }

    function searchFunction() {
        let input = document.getElementById('search-input').value.trim();
        let userResultBox = document.getElementById('search-user-result');
        if(!userResultBox) return;
         
        if(!input) {
            userResultBox.innerHTML = "";
            let cards = document.getElementById('all-rooms-list')?.getElementsByClassName('item-card') || [];
            for (let i = 0; i < cards.length; i++) { cards[i].style.display = "flex"; }
            return;
        }

        if(/^\d+$/.test(input)) {
            database.ref('users/' + input).once('value', (snapshot) => {
                let searchedUser = snapshot.val();
                if(snapshot.exists()) {
                    userResultBox.innerHTML = `
                        <div class="searched-user-box" onclick="filterRoomsByUser('${searchedUser.phone}', '${searchedUser.name}')">
                            <img src="${searchedUser.img || defaultAvatar}" class="room-avatar">
                            <div style="flex:1;">
                                <b style="color:#1e1b4b;">👤 ${searchedUser.name}</b>
                                <span style="display:block; font-size:12px; color:#4f46e5;">Рақам: ${searchedUser.phone}</span>
                            </div>
                        </div>`;
                } else {
                    userResultBox.innerHTML = "<p style='color:gray; font-size:13px; margin-bottom:10px;'>Бо ин рақам ягон профил ёфт нашуд.</p>";
                }
            });
        } else {
            userResultBox.innerHTML = "";
            let cards = document.getElementById('all-rooms-list')?.getElementsByClassName('item-card) || [];
            for (let i = 0; i < cards.length; i++) {
                cards[i].style.display = cards[i].innerText.toLowerCase().includes(input.toLowerCase()) ? "flex" : "none";
            }
        }
    }

    function filterRoomsByUser(phone, name) {
        filterByCreatorPhone = phone;
        const title = document.getElementById('rooms-list-title');
        const resetBtn = document.getElementById('reset-filter-btn');
        const searchInput = document.getElementById('search-input');
        const userResult = document.getElementById('search-user-result');
        
        if (title) title.innerText = `🏢 Комнатаҳои ${name}`;
        if (resetBtn) resetBtn.style.display = "inline-block";
        if (searchInput) searchInput.value = "";
        if (userResult) userResult.innerHTML = "";
        renderRoomsUI();
    }

    function resetRoomFilter() {
        filterByCreatorPhone = "";
        const title = document.getElementById('rooms-list-title');
        const resetBtn = document.getElementById('reset-filter-btn');
        
        if (title) title.innerText = "🏢 Ҳамаи Комнатаҳо";
        if (resetBtn) resetBtn.style.display = "none";
        renderRoomsUI();
    }

    function tryEnterRoom(roomId) {
        let room = roomsData.find(r => r.id === roomId);
        if(room) {
            if(room.pass) {
                let userPass = prompt(`Ин комната қулф аст 🔒. Рамзро ворид кунед:`);
                if(userPass === room.pass) { openChat(room.name, room.img, room.id); } 
                else if(userPass !== null) { alert("Рамз нодуруст аст!"); }
            } else { openChat(room.name, room.img, room.id); }
        }
    }

    // ==========================================
    // ҚИСМИ ИСЛОҲШУДА ВА ИЛОВАШУДАИ ПАЁМҲО ВА ГАЛОЧКАҲО
    // ==========================================

    function listenToUnreadMessages() {
        database.ref('messages').on('value', (snapshot) => {
            let allMessages = snapshot.val() || {};
            globalUnreadCounts = {};
            lastMessagesData = {};
            let totalUnread = 0;

            Object.keys(allMessages).forEach(roomId => {
                let roomMsgs = allMessages[roomId];
                let unreadCount = 0;
                let lastMsg = null;

                Object.keys(roomMsgs).forEach(msgId => {
                    let msg = roomMsgs[msgId];
                    if(!lastMsg || msg.timestamp > lastMsg.timestamp) {
                        lastMsg = msg;
                    }
                    if(msg.senderPhone !== userData.phone && (!msg.readBy || !msg.readBy[userData.phone])) {
                        unreadCount++;
                    }
                });

                if(unreadCount > 0) {
                    globalUnreadCounts[roomId] = unreadCount;
                    totalUnread += unreadCount;
                }
                if(lastMsg) {
                    lastMessagesData[roomId] = lastMsg;
                }
            });

            // Навсозии ҳисобкунаки умумии навигатсия
            let badge = document.getElementById('total-unread-badge');
            if(badge) {
                if(totalUnread > 0) {
                    badge.innerText = totalUnread;
                    badge.style.display = 'block';
                } else {
                    badge.style.display = 'none';
                }
            }

            if(document.getElementById('chat-screen').classList.contains('active-screen')) {
                renderActiveChats();
            }
        });
    }

    function renderActiveChats() {
        let chatScreenList = document.getElementById('active-chats-list');
        if(!chatScreenList) return;
        let html = "";

        // Чатҳоеро нишон медиҳем, ки дар онҳо паём ҳаст
        let activeRooms = roomsData.filter(r => lastMessagesData[r.id]);
        
        // Сортировка аз рӯи паёми охирин
        activeRooms.sort((a,b) => (lastMessagesData[b.id]?.timestamp || 0) - (lastMessagesData[a.id]?.timestamp || 0));

        activeRooms.forEach(room => {
            let lastMsg = lastMessagesData[room.id];
            let unread = globalUnreadCounts[room.id] || 0;
            let badgeHtml = unread > 0 ? `<span class="badge">${unread}</span>` : "";
            let text = lastMsg ? (lastMsg.senderName + ": " + lastMsg.text) : "Паём нест";
            if(text.length > 40) text = text.substring(0,40) + "...";

            html += `
                <div class="item-card" onclick="openChat('${room.name}', '${room.img}', '${room.id}')">
                    <div class="card-main-info">
                        <img src="${room.img || defaultAvatar}" class="room-avatar">
                        <div class="card-info" style="flex:1; margin-left:10px;">
                            <b>🏢 ${room.name}</b>
                            <span style="font-size:13px; color:#4a5568; display:block; margin-top:2px;">${text}</span>
                        </div>
                        ${badgeHtml}
                    </div>
                </div>`;
        });

        chatScreenList.innerHTML = html || "<p style='color:gray; font-size:14px;'>Чатҳои фаъол мавҷуд нестанд.</p>";
    }

    function openChat(roomName, roomImg, roomId) {
        currentChatRoomId = roomId;
        const chatTitle = document.getElementById('chat-title');
        const msgList = document.getElementById('chat-messages-list');
        const chatWindow = document.getElementById('chat-window');
        
        if (chatTitle) chatTitle.innerText = roomName;
        if (msgList) msgList.innerHTML = ""; 
        if (chatWindow) chatWindow.style.display = 'flex';
        loadMessages(roomId);
    }

    function loadMessages(roomId) {
        database.ref('messages/' + roomId).on('value', (snapshot) => {
            let messages = snapshot.val() || {};
            let msgList = document.getElementById('chat-messages-list');
            if(!msgList || currentChatRoomId !== roomId) return;

            msgList.innerHTML = "";
            let lastDateStr = "";

            Object.keys(messages).forEach(msgId => {
                let msg = messages[msgId];

                // Ҳолати паёмро ҳамчун хондашуда қайд кардан (агар паёми дигарон бошад)
                if(msg.senderPhone !== userData.phone && (!msg.readBy || !msg.readBy[userData.phone])) {
                    database.ref(`messages/${roomId}/${msgId}/readBy/${userData.phone}`).set(true);
                }

                // Тақсимоти паёмҳо аз рӯи сана
                let msgDate = new Date(msg.timestamp);
                let dateStr = msgDate.toLocaleDateString('tg-TJ', { day: 'numeric', month: 'long' });
                if(dateStr !== lastDateStr) {
                    msgList.innerHTML += `<div class="date-divider"><span>${dateStr}</span></div>`;
                    lastDateStr = dateStr;
                }

                let isMe = msg.senderPhone === userData.phone ? 'me' : 'other';
                let timeStr = msgDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                // Муайян кардани ГАЛОЧКАҲО (Ticks)
                let ticksHtml = "";
                if(isMe) {
                    let readCount = msg.readBy ? Object.keys(msg.readBy).length : 0;
                    if(readCount > 0) {
                        ticksHtml = `<span class="ticks read">✓✓</span>`; // Хонда шуд (кабуд)
                    } else {
                        ticksHtml = `<span class="ticks delivered">✓</span>`; // Расид (хокистарӣ)
                    }
                }

                let deleteHtml = isMe ? `<button class="delete-btn" onclick="deleteMessage('${roomId}', '${msgId}')">✕</button>` : "";

                msgList.innerHTML += `
                    <div class="msg-wrapper ${isMe}">
                        <img src="${msg.senderImg || defaultAvatar}" class="msg-avatar">
                        <div class="msg-body">
                            ${isMe ? '' : `<span class="msg-username">${msg.senderName}</span>`}
                            <div class="msg-bubble">
                                <div class="msg-text">${msg.text}</div>
                                <div class="msg-footer">
                                    ${deleteHtml}
                                    <span>${timeStr}</span>
                                    ${ticksHtml}
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
            
            // Скролл ба поёни чат
            msgList.scrollTop = msgList.scrollHeight;
        });
    }

    function sendMessage() {
        let input = document.getElementById('message-input');
        if(!input || !currentChatRoomId) return;
        let text = input.value.trim();
        if(!text) return;

        let msgId = 'msg_' + Date.now();
        let msgData = {
            id: msgId,
            text: text,
            senderPhone: userData.phone,
            senderName: userData.name,
            senderImg: userData.img || defaultAvatar,
            timestamp: ServerValueTimestamp(), // Барои вақти аниқи сервер
            readBy: {}
        };

        database.ref('messages/' + currentChatRoomId + '/' + msgId).set(msgData).then(() => {
            input.value = "";
            autoGrow(input);
        });
    }

    function ServerValueTimestamp() {
        return Date.now(); // Ё метавонед firebase.database.ServerValue.TIMESTAMP-ро истифода баред
    }

    function deleteMessage(roomId, msgId) {
        if(confirm("Оё мехоҳед ин паёмро нест кунед?")) {
            database.ref(`messages/${roomId}/${msgId}`).remove();
        }
    }

    function closeChat() {
        if(currentChatRoomId) {
            database.ref('messages/' + currentChatRoomId).off();
        }
        currentChatRoomId = "";
        const chatWindow = document.getElementById('chat-window');
        if (chatWindow) chatWindow.style.display = 'none';
    }
</script>
