<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web Clone (Firebase)</title>
    <!-- Tailwind CSS ва FontAwesome барои тарҳи зебо -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Услуби махсуси WhatsApp */
        .whatsapp-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .dark .whatsapp-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); filter: invert(0.9) hue-rotate(180deg); }
        .message-in { background-color: #ffffff; border-radius: 0px 8px 8px 8px; }
        .message-out { background-color: #d9fdd3; border-radius: 8px 0px 8px 8px; }
        .dark .message-in { background-color: #202c33; color: #e9edef; }
        .dark .message-out { background-color: #005c4b; color: #e9edef; }
    </style>
</head>
<body class="bg-gray-100 h-screen overflow-hidden font-sans transition-colors duration-200" id="app-body">

    <!-- Саҳифаи Вуруд (Auth Screen) -->
    <div id="auth-screen" class="fixed inset-0 bg-[#00a884] flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md text-center">
            <i class="fab fa-whatsapp text-6xl text-[#25d366] mb-4"></i>
            <h2 class="text-2xl font-bold mb-6 text-gray-800">Хуш омадед ба Чат</h2>
            <input type="email" id="auth-email" placeholder="Email" class="w-full p-3 border rounded mb-3 outline-none">
            <input type="password" id="auth-password" placeholder="Рамз" class="w-full p-3 border rounded mb-4 outline-none">
            <div class="flex gap-2">
                <button onclick="handleLogin()" class="w-1/2 bg-[#00a884] text-white p-3 rounded font-semibold hover:bg-[#008f72]">Вуруд</button>
                <button onclick="handleRegister()" class="w-1/2 bg-gray-200 text-gray-700 p-3 rounded font-semibold hover:bg-gray-300">Рӯйхатгирӣ</button>
            </div>
        </div>
    </div>

    <!-- Асосии Интерфейс (Main Chat Interface) -->
    <div class="flex h-screen w-full hidden" id="main-interface">
        
        <!-- Панели чап (Рӯйхати чатҳо ва профил) -->
        <div class="w-1/3 border-r border-gray-300 dark:border-gray-700 bg-white dark:bg-[#111b21] flex flex-col h-full">
            <!-- Header-и профил -->
            <div class="bg-[#f0f2f5] dark:bg-[#202c33] p-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <img id="my-avatar" src="https://via.placeholder.com/150" class="w-10 h-10 rounded-full object-cover cursor-pointer" onclick="toggleProfileModal()">
                    <span id="my-name" class="font-semibold dark:text-white text-gray-800">Корбар</span>
                </div>
                <div class="flex gap-4 text-gray-600 dark:text-gray-300 text-xl">
                    <button onclick="toggleDarkMode()"><i class="fas fa-moon" id="dark-icon"></i></button>
                    <button onclick="openCreateRoomModal()"><i class="fas fa-comment-medical"></i></button>
                    <button onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>

            <!-- Ҷустуҷӯ (Search) -->
            <div class="p-2 bg-white dark:bg-[#111b21] border-b border-gray-200 dark:border-gray-800">
                <div class="bg-[#f0f2f5] dark:bg-[#202c33] flex items-center p-2 rounded-lg">
                    <i class="fas fa-search text-gray-500 mr-3 pl-2"></i>
                    <input type="text" id="search-input" placeholder="Ҷустуҷӯи рӯм ё корбар..." class="bg-transparent w-full outline-none text-sm dark:text-white">
                </div>
            </div>

            <!-- Рӯйхати Рӯмҳо ва Корбарон -->
            <div class="flex-1 overflow-y-auto" id="rooms-list">
                <!-- Рӯмҳо ба таври автоматӣ аз Firebase ин ҷо меоянд -->
            </div>
        </div>

        <!-- Панели рост (Оинаи чат) -->
        <div class="w-2/3 flex flex-col h-full bg-[#efeae2] dark:bg-[#0b141a] relative">
            <div id="no-chat-selected" class="absolute inset-0 flex flex-col items-center justify-center bg-[#f8f9fa] dark:bg-[#222e35] z-10">
                <i class="fab fa-whatsapp text-9xl text-gray-300 dark:text-gray-700 mb-4"></i>
                <h3 class="text-xl text-gray-600 dark:text-gray-400">WhatsApp Web Clone</h3>
                <p class="text-sm text-gray-400 mt-2">Барои оғози чат аз рӯйхати чап рӯмро интихоб кунед.</p>
            </div>

            <!-- Header-и Чат -->
            <div class="bg-[#f0f2f5] dark:bg-[#202c33] p-3 flex justify-between items-center border-b dark:border-gray-800">
                <div class="flex items-center gap-3">
                    <img id="chat-header-avatar" src="https://via.placeholder.com/150" class="w-10 h-10 rounded-full object-cover">
                    <div>
                        <h4 id="chat-header-name" class="font-semibold text-gray-800 dark:text-white">Номи Рӯм</h4>
                        <p id="chat-header-status" class="text-xs text-gray-500 dark:text-gray-400">online</p>
                    </div>
                </div>
                <div class="flex gap-4 text-gray-600 dark:text-gray-300 text-lg pr-2">
                    <button onclick="shareRoomLink()"><i class="fas fa-share-alt"></i></button>
                    <button onclick="toggleAdminPanel()"><i class="fas fa-ellipsis-v"></i></button>
                </div>
            </div>

            <!-- Мадони Паёмакҳо (Messages Area) -->
            <div class="flex-1 overflow-y-auto p-6 whatsapp-bg space-y-3" id="messages-container">
                <!-- Паёмакҳо ин ҷо бор мешаванд -->
            </div>

            <!-- Нишондиҳандаи Навишта истодааст (Typing Indicator) -->
            <div id="typing-indicator" class="px-6 py-1 text-xs text-gray-500 italic hidden bg-transparent">
                касе навишта истодааст...
            </div>

            <!-- Панели Reply (Агар фаъол бошад) -->
            <div id="reply-preview" class="hidden bg-gray-200 dark:bg-[#1f2c34] p-2 px-6 flex justify-between items-center border-l-4 border-[#00a884]">
                <div>
                    <p class="text-xs text-[#00a884] font-bold" id="reply-user">Ҷавоб ба</p>
                    <p class="text-sm text-gray-600 dark:text-gray-300 truncate" id="reply-text">Текст</p>
                </div>
                <button onclick="cancelReply()"><i class="fas fa-times text-gray-500"></i></button>
            </div>

            <!-- Панели Ирсоли Паём -->
            <div class="bg-[#f0f2f5] dark:bg-[#202c33] p-3 flex items-center gap-3">
                <button onclick="toggleEmojiPicker()" class="text-gray-600 dark:text-gray-300 text-xl"><i class="far fa-smile"></i></button>
                <label class="text-gray-600 dark:text-gray-300 text-xl cursor-pointer">
                    <i class="fas fa-paperclip"></i>
                    <input type="file" id="file-input" class="hidden" onchange="uploadFile(this)">
                </label>
                <input type="text" id="message-input" placeholder="Паём нависед..." class="flex-1 p-2 rounded-lg bg-white dark:bg-[#2a3942] outline-none dark:text-white" oninput="sendTypingStatus()">
                <button onclick="sendMessage()" class="text-gray-600 dark:text-gray-300 text-xl"><i class="fas fa-paper-plane text-[#00a884]"></i></button>
            </div>
        </div>
    </div>

    <!-- ————————————————— MODALS & PANELS ————————————————— -->
    <!-- Admin Panel (Оинаи танзимоти рӯм) -->
    <div id="admin-panel" class="fixed right-0 top-0 bottom-0 w-80 bg-white dark:bg-[#111b21] shadow-xl transform translate-x-full transition-transform duration-300 z-30 p-4 border-l dark:border-gray-800">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-bold text-lg dark:text-white">Идоракунии Рӯм</h3>
            <button onclick="toggleAdminPanel()"><i class="fas fa-times dark:text-white"></i></button>
        </div>
        <div class="space-y-4">
            <button onclick="deleteRoom()" class="w-full text-left p-2 bg-red-100 text-red-600 rounded flex items-center gap-2"><i class="fas fa-trash"></i> Нест кардани Рӯм</button>
            <div class="border-t pt-4">
                <h4 class="font-semibold text-sm mb-2 dark:text-gray-300">Иштирокчиён:</h4>
                <div id="room-members-list" class="space-y-2 text-sm dark:text-white">
                    <!-- Рӯйхати аъзоён бо тугмаҳои Ban/Mute -->
                </div>
            </div>
        </div>
    </div>

    <!-- Модали Профил -->
    <div id="profile-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white dark:bg-[#222e35] p-6 rounded-lg max-w-sm w-full text-center">
            <h3 class="text-xl font-bold mb-4 dark:text-white">Профили Корбар</h3>
            <input type="text" id="profile-name-input" class="w-full p-2 border rounded mb-3 dark:bg-[#2a3942] dark:text-white" placeholder="Номи Шумо">
            <div class="flex justify-end gap-2">
                <button onclick="toggleProfileModal()" class="px-4 py-2 bg-gray-300 rounded text-sm">Бастан</button>
                <button onclick="saveProfile()" class="px-4 py-2 bg-[#00a884] text-white rounded text-sm">Ҳифз кардан</button>
            </div>
        </div>
    </div>

    <!-- ————————————————— FIREBASE SDK INTEGRATION ————————————————— -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, update, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-storage.js";

        // Танзимоти Firebase-и худро дар ин ҷо гузоред:
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const storage = getStorage(app);

        let currentUser = null;
        let activeRoomId = null;
        let replyToMessageId = null;

        // Вуруд ва Бақайдгирӣ
        window.handleLogin = () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            signInWithEmailAndPassword(auth, email, pass).catch(err => alert(err.message));
        };

        window.handleRegister = () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            createUserWithEmailAndPassword(auth, email, pass).then(cred => {
                set(ref(db, 'users/' + cred.user.uid), {
                    uid: cred.user.uid,
                    name: email.split('@')[0],
                    email: email,
                    status: "online",
                    lastSeen: serverTimestamp()
                });
            }).catch(err => alert(err.message));
        };

        window.handleLogout = () => signOut(auth);

        // Назорати Ҳолати Корбар (Auth State)
        onAuthStateChanged(auth, user => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-interface').classList.remove('hidden');
                
                // Боркунии маълумоти ман
                onValue(ref(db, 'users/' + user.uid), snapshot => {
                    const data = snapshot.val();
                    if(data) {
                        document.getElementById('my-name').innerText = data.name;
                        document.getElementById('my-avatar').src = data.avatar || "https://via.placeholder.com/150";
                    }
                });

                // Навсозии статус ба Online
                update(ref(db, 'users/' + user.uid), { status: "online" });
                
                loadRooms();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-interface').classList.add('hidden');
            }
        });

        // Боркунии Рӯмҳо ва Чатҳо
        function loadRooms() {
            onValue(ref(db, 'rooms'), snapshot => {
                const listContainer = document.getElementById('rooms-list');
                listContainer.innerHTML = '';
                snapshot.forEach(child => {
                    const room = child.val();
                    const div = document.createElement('div');
                    div.className = "flex items-center gap-3 p-3 border-b dark:border-gray-800 hover:bg-gray-100 dark:hover:bg-[#202c33] cursor-pointer";
                    div.onclick = () => selectRoom(child.key, room.name, room.avatar);
                    div.innerHTML = `
                        <img src="${room.avatar || 'https://via.placeholder.com/150'}" class="w-12 h-12 rounded-full object-cover">
                        <div class="flex-1">
                            <div class="flex justify-between"><h5 class="font-semibold text-gray-800 dark:text-white">${room.name}</h5></div>
                            <p class="text-xs text-gray-500 truncate">Барои кушодани чат пахш кунед</p>
                        </div>
                    `;
                    listContainer.appendChild(div);
                });
            });
        }

        // Интихоби Рӯм
        function selectRoom(roomId, roomName, roomAvatar) {
            activeRoomId = roomId;
            document.getElementById('no-chat-selected').classList.add('hidden');
            document.getElementById('chat-header-name').innerText = roomName;
            document.getElementById('chat-header-avatar').src = roomAvatar || 'https://via.placeholder.com/150';
            loadMessages(roomId);
            listenToTyping(roomId);
        }

        // Ирсоли Паём
        window.sendMessage = () => {
            const text = document.getElementById('message-input').value;
            if(!text.trim() || !activeRoomId) return;

            const msgData = {
                senderId: currentUser.uid,
                senderName: document.getElementById('my-name').innerText,
                text: text,
                timestamp: serverTimestamp(),
                seen: false
            };

            if(replyToMessageId) {
                msgData.replyTo = replyToMessageId;
                cancelReply();
            }

            push(ref(db, `messages/${activeRoomId}`), msgData);
            document.getElementById('message-input').value = '';
            // Қатъи ҳолати typing пас аз ирсол
            set(ref(db, `typing/${activeRoomId}/${currentUser.uid}`), null);
        };

        // Боркунии Паёмакҳо (WhatsApp Стил)
        function loadMessages(roomId) {
            onValue(ref(db, `messages/${roomId}`), snapshot => {
                const container = document.getElementById('messages-container');
                container.innerHTML = '';
                snapshot.forEach(child => {
                    const msg = child.val();
                    const isMe = msg.senderId === currentUser.uid;
                    
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `flex ${isMe ? 'justify-end' : 'justify-start'} w-full mb-1`;
                    
                    msgDiv.innerHTML = `
                        <div class="max-w-xs md:max-w-md p-2 shadow-sm relative ${isMe ? 'message-out' : 'message-in'}">
                            ${msg.replyTo ? `<div class="bg-black bg-opacity-5 p-1 border-l-4 border-emerald-500 text-xs mb-1 rounded">Иқтибос (Reply)</div>` : ''}
                            <p class="text-sm pr-12">${msg.text}</p>
                            <span class="absolute bottom-1 right-2 text-[10px] text-gray-500 flex items-center gap-1">
                                ${new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                                ${isMe ? '<i class="fas fa-check-double text-blue-500"></i>' : ''}
                            </span>
                        </div>
                    `;
                    container.appendChild(msgDiv);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        // Навишта истодааст... (Typing Indicator)
        window.sendTypingStatus = () => {
            if(!activeRoomId) return;
            set(ref(db, `typing/${activeRoomId}/${currentUser.uid}`), true);
            setTimeout(() => {
                set(ref(db, `typing/${activeRoomId}/${currentUser.uid}`), null);
            }, 3000);
        };

        function listenToTyping(roomId) {
            onValue(ref(db, `typing/${roomId}`), snapshot => {
                const ind = document.getElementById('typing-indicator');
                if(snapshot.exists()) {
                    ind.classList.remove('hidden');
                } else {
                    ind.classList.add('hidden');
                }
            });
        }

        // Dark Mode
        window.toggleDarkMode = () => {
            const body = document.getElementById('app-body');
            body.classList.toggle('dark');
            const icon = document.getElementById('dark-icon');
            icon.className = body.classList.contains('dark') ? "fas fa-sun text-yellow-400" : "fas fa-moon";
        };

        // Файли Медиа (Storage)
        window.uploadFile = (input) => {
            if(!input.files[0] || !activeRoomId) return;
            const file = input.files[0];
            const fileRef = sRef(storage, `chats/${activeRoomId}/${Date.now()}_${file.name}`);
            uploadBytes(fileRef, file).then(() => {
                getDownloadURL(fileRef).then(url => {
                    push(ref(db, `messages/${activeRoomId}`), {
                        senderId: currentUser.uid,
                        senderName: document.getElementById('my-name').innerText,
                        text: `📁 Файл: ${url}`,
                        timestamp: serverTimestamp()
                    });
                });
            });
        };

        // Панели Идоракунӣ ва Модалҳо
        window.toggleAdminPanel = () => document.getElementById('admin-panel').classList.toggle('translate-x-full');
        window.toggleProfileModal = () => document.getElementById('profile-modal').classList.toggle('hidden');
        
        window.saveProfile = () => {
            const newName = document.getElementById('profile-name-input').value;
            if(newName.trim()) {
                update(ref(db, 'users/' + currentUser.uid), { name: newName });
                toggleProfileModal();
            }
        };

        window.shareRoomLink = () => {
            if(!activeRoomId) return;
            navigator.clipboard.writeText(window.location.href + "?room=" + activeRoomId);
            alert("Истиноди рӯм нусхабардорӣ шуд!");
        };

        window.cancelReply = () => {
            replyToMessageId = null;
            document.getElementById('reply-preview').classList.add('hidden');
        };
    </script>
</body>
</html>
